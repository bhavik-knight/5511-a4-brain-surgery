name: CI Pipeline

on: [push, pull_request]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Dependencies
        run: uv sync --frozen

      - name: Check Formatting (Rule 3)
        run: uv run ruff format --check .

      - name: Lint, Docstrings, & Modern Types (Rules 2, 4, 5)
        # This will fail if docstrings or type hints are missing
        # as defined in your pyproject.toml
        run: uv run ruff check .

      - name: Static Type Checking (Rule 2)
        run: uv run mypy .
